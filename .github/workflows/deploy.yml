name: Deploy to GitHub Pages

on:
  # Build and deploy on every push to main
  push:
    branches: [main]
  # ...and let you trigger a deploy by hand from the Actions tab
  workflow_dispatch:

# Permissions the deploy job needs to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# If you push twice quickly, cancel the older in-flight deploy
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
